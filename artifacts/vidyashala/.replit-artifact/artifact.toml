kind = "web"
previewPath = "/"
title = "VidyaShala"
version = "1.0.0"
id = "artifacts/vidyashala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21298

[services.development]
run = "pnpm --filter @workspace/vidyashala run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vidyashala", "run", "build" ]
publicDir = "artifacts/vidyashala/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21298"
BASE_PATH = "/"
